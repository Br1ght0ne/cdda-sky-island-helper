<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Island Helper — Upgrade &amp; Item Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="wrap header-inner">
      <h1>Sky Island <span class="accent">Helper</span></h1>
      <p class="sub">Track what items you need for upgrades, constructions &amp; raid unlocks in the CDDA <em>Sky Island</em> mod.</p>
    </div>
  </header>

  <div class="wrap layout">
    <main>
      <div class="toolbar">
        <input type="search" id="search" placeholder="Search upgrades or items…" autocomplete="off">
        <label class="chk"><input type="checkbox" id="hide-done"> Hide completed</label>
        <label class="chk"><input type="checkbox" id="only-plan"> Only planned</label>
        <button id="clear-plan" class="btn ghost" type="button">Clear plan</button>
      </div>
      <div id="stats" class="stats"></div>
      <div id="list"></div>
    </main>

    <aside>
      <div class="panel sticky">
        <h2>Shopping list</h2>
        <p class="hint" id="plan-hint">Click <strong>＋ Plan</strong> on any upgrade to add its materials here.</p>
        <div id="shopping"></div>
      </div>
    </aside>
  </div>

  <footer class="wrap">
    <span id="foot"></span> · Data generated from <code>CleverRaven/cataclysm-dda</code> · progress saved in your browser.
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
